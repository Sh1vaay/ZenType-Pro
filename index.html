<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenType: Progressive Typing Tutor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes caret {

      from,
      to {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }
    }

    .animate-caret {
      animation: caret 1s infinite;
    }

    @keyframes blob {
      0% {
        transform: translate(0px, 0px) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }

    .animate-blob {
      animation: blob 7s infinite;
    }

    .animation-delay-2000 {
      animation-delay: 2s;
    }

    .animation-delay-4000 {
      animation-delay: 4s;
    }

    .animation-delay-6000 {
      animation-delay: 6s;
    }

    @keyframes scan {
      from {
        transform: translateY(-50%) skewY(-5deg);
      }

      to {
        transform: translateY(150%) skewY(-5deg);
      }
    }

    .animate-scan {
      animation: scan 8s linear infinite;
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin-slow {
      animation: spin-slow 20s linear infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .animate-shimmer {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    .holo-card {
      position: relative;
      overflow: hidden;
    }

    .holo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.1) 45%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.1) 55%, transparent 60%, transparent 100%);
      background-size: 200% 200%;
      animation: shimmer 5s infinite;
      pointer-events: none;
    }

    @keyframes aurora {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }

      50% {
        transform: translate(10%, 10%) rotate(5deg) scale(1.2);
      }

      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .animate-aurora {
      animation: aurora 20s ease-in-out infinite;
    }

    .aurora-blur {
      filter: blur(100px);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
